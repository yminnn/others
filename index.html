<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇游戏</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141b34;
      --grid: #1e2a4a;
      --snake: #4ade80;
      --snake-head: #22c55e;
      --food: #fb7185;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #111a35 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(92vw, 560px);
      padding: 20px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(20, 27, 52, 0.95), rgba(20, 27, 52, 0.82));
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .score-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid rgba(96, 165, 250, 0.35);
      background: rgba(96, 165, 250, 0.15);
      color: var(--accent);
      font-size: 0.92rem;
    }

    .board-wrap {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: #090f22;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        #0a122b;
      background-size: 5% 5%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px;
      font-size: 1.05rem;
      line-height: 1.6;
      font-weight: 700;
      color: #f8fafc;
      background: rgba(8, 12, 24, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .overlay.show { opacity: 1; }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    button {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: linear-gradient(180deg, #1f2b4d, #1a2544);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(96, 165, 250, 0.7);
      box-shadow: 0 8px 18px rgba(96, 165, 250, 0.25);
    }

    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <h1>🐍 贪吃蛇</h1>
      <div class="score-group">
        <div class="badge" id="score">分数：0</div>
        <div class="badge" id="bestScore">最高分：0</div>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="gameCanvas" width="500" height="500" aria-label="贪吃蛇游戏画布"></canvas>
      <div class="overlay" id="statusText"></div>
    </div>

    <p class="hint">方向键控制移动；避免快速反向；按空格键可快速重新开始。</p>
    <div class="actions">
      <button id="restartBtn" type="button">重新开始</button>
    </div>
  </main>

  <script>
    (() => {
      // 网格与速度设置
      const GRID_COUNT = 20;
      const TILE_SIZE = 25;
      const TICK_MS = 130; // 初始速度：适中

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");
      const restartBtn = document.getElementById("restartBtn");
      const statusText = document.getElementById("statusText");

      const DIRECTIONS = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }
      };

      let snake = [];
      let direction = { x: 1, y: 0 };
      let pendingDirection = { x: 1, y: 0 };
      let food = { x: 0, y: 0 };
      let score = 0;
      let bestScore = 0;
      let gameLoop = null;
      let isGameOver = false;

      function setOverlay(message, show) {
        statusText.textContent = message;
        statusText.classList.toggle("show", show);
      }

      // 初始化或重置游戏
      function resetGame() {
        snake = [
          { x: 8, y: 10 },
          { x: 7, y: 10 },
          { x: 6, y: 10 }
        ];
        direction = { x: 1, y: 0 };
        pendingDirection = { x: 1, y: 0 };
        score = 0;
        isGameOver = false;

        scoreEl.textContent = `分数：${score}`;
        bestScoreEl.textContent = `最高分：${bestScore}`;
        setOverlay("", false);

        placeFood();
        draw();

        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(tick, TICK_MS);
      }

      // 食物生成：不能出现在蛇身上
      function placeFood() {
        const freeCells = [];

        for (let y = 0; y < GRID_COUNT; y++) {
          for (let x = 0; x < GRID_COUNT; x++) {
            const occupied = snake.some((segment) => segment.x === x && segment.y === y);
            if (!occupied) freeCells.push({ x, y });
          }
        }

        if (freeCells.length === 0) {
          endGame("你已占满全图，完美通关！");
          return;
        }

        food = freeCells[Math.floor(Math.random() * freeCells.length)];
      }

      function tick() {
        if (isGameOver) return;

        direction = pendingDirection;
        const nextHead = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        // 撞墙检测
        const hitWall =
          nextHead.x < 0 ||
          nextHead.x >= GRID_COUNT ||
          nextHead.y < 0 ||
          nextHead.y >= GRID_COUNT;

        // 撞自己检测
        const hitSelf = snake.some((segment) => segment.x === nextHead.x && segment.y === nextHead.y);

        if (hitWall || hitSelf) {
          endGame("游戏结束，点击“重新开始”再来一局！");
          return;
        }

        snake.unshift(nextHead);

        // 吃到食物则加分并增长
        if (nextHead.x === food.x && nextHead.y === food.y) {
          score += 1;
          bestScore = Math.max(bestScore, score);
          scoreEl.textContent = `分数：${score}`;
          bestScoreEl.textContent = `最高分：${bestScore}`;
          placeFood();
        } else {
          // 未吃到食物，移除尾巴保持长度
          snake.pop();
        }

        draw();
      }

      function endGame(message) {
        isGameOver = true;
        setOverlay(message, true);
        clearInterval(gameLoop);
      }

      // 绘制游戏画面
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 画食物
        ctx.fillStyle = "#fb7185";
        ctx.beginPath();
        ctx.arc(food.x * TILE_SIZE + TILE_SIZE / 2, food.y * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE * 0.32, 0, Math.PI * 2);
        ctx.fill();

        // 画蛇
        snake.forEach((segment, index) => {
          ctx.fillStyle = index === 0 ? "#22c55e" : "#4ade80";
          ctx.fillRect(segment.x * TILE_SIZE + 2, segment.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
        });
      }

      // 键盘控制与防反向
      window.addEventListener("keydown", (event) => {
        if (event.key === " ") {
          event.preventDefault();
          resetGame();
          return;
        }

        const next = DIRECTIONS[event.key];
        if (!next || isGameOver) return;

        // 阻止页面滚动，让方向键只控制游戏
        event.preventDefault();

        // 防止快速反向：与“待执行方向”相反也算反向
        const isReverse = next.x + pendingDirection.x === 0 && next.y + pendingDirection.y === 0;
        if (isReverse) return;

        pendingDirection = next;
      });

      restartBtn.addEventListener("click", resetGame);
      setOverlay("按方向键开始移动", true);
      resetGame();
    })();
  </script>
</body>
</html>
